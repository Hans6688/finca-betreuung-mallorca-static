# www → non-www Redirect
[[redirects]]
  from = "https://www.finca-betreuung-mallorca.com/*"
  to = "https://finca-betreuung-mallorca.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/leistungen"
  to = "/leistungen/index.html"
  status = 200
[[redirects]]
  from = "/technisches-management"
  to = "/technisches-management/index.html"
  status = 200
[[redirects]]
  from = "/ueber-uns"
  to = "/ueber-uns/index.html"
  status = 200
[[redirects]]
  from = "/pool-audit"
  to = "/pool-audit/index.html"
  status = 200
[[redirects]]
  from = "/kontakt"
  to = "/kontakt/index.html"
  status = 200
[[redirects]]
  from = "/impressum"
  to = "/impressum/index.html"
  status = 200
[[redirects]]
  from = "/datenschutz"
  to = "/datenschutz/index.html"
  status = 200
[[redirects]]
  from = "/agb"
  to = "/agb/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://d2xsxph8kpxj0f.cloudfront.net https://www.google-analytics.com; connect-src 'self' https://www.google-analytics.com; frame-ancestors 'none'"
    Cache-Control = "public, max-age=3600"
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
