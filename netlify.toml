# www → non-www Redirect
[[redirects]]
  from = "https://www.finca-betreuung-mallorca.com/*"
  to = "https://finca-betreuung-mallorca.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/leistungen"
  to = "/leistungen/index.html"
  status = 200
[[redirects]]
  from = "/technisches-management"
  to = "/technisches-management/index.html"
  status = 200
[[redirects]]
  from = "/ueber-uns"
  to = "/ueber-uns/index.html"
  status = 200
[[redirects]]
  from = "/pool-audit"
  to = "/pool-audit/index.html"
  status = 200
[[redirects]]
  from = "/kontakt"
  to = "/kontakt/index.html"
  status = 200
[[redirects]]
  from = "/impressum"
  to = "/impressum/index.html"
  status = 200
[[redirects]]
  from = "/datenschutz"
  to = "/datenschutz/index.html"
  status = 200
[[redirects]]
  from = "/agb"
  to = "/agb/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=3600"
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
